name: Build Prism Swap APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project (اگه فایل به‌صورت zip توی ریشه‌ی ریپو آپلود شده)
        run: |
          if [ -f cordova-project.zip ]; then
            unzip -o cordova-project.zip -d .
            echo "زیپ باز شد"
          else
            echo "زیپی پیدا نشد، فرض میکنیم فایل‌ها از قبل باز شدن"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Platform 36 + Build Tools (نیاز cordova-android@15)
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Setup Gradle 8.14.2 (نسخه‌ای که cordova-android@15 باهاش تست شده — گردل پیش‌فرض سرور خیلی جدیدتره و باعث خطای XmlParser میشه)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.2

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Install project dependencies
        working-directory: cordova-project
        run: npm install

      - name: Add Android platform
        working-directory: cordova-project
        run: cordova platform add android@15.0.0

      - name: Add Tapsell plugin
        working-directory: cordova-project
        run: cordova plugin add tapsell-v3-cordova-plugin

      - name: Patch Tapsell plugin for AndroidX compatibility
        # این پلاگین ۴ ساله آپدیت نشده و از قبل از تغییر CordovaActivity
        # به AppCompatActivity نوشته شده. چند خط instanceof/cast داخلیش
        # با نوع جدید کامپایل نمیشن. این خط‌ها اصلاً کد مرده بودن (چون
        # Activity تبلیغ تپسل همیشه جدا از MainActivity بازیه)، پس این
        # پچ فقط برای عبور از کامپایلره، رفتار واقعی رو تغییر نمیده.
        run: |
          FILE="cordova-project/platforms/android/app/src/main/java/ir/tapsell/sdk/TapsellCordovaInterface.java"
          sed -i 's/cordova\.getActivity() instanceof TapsellAdActivity/((Object)cordova.getActivity()) instanceof TapsellAdActivity/g' "$FILE"
          sed -i 's/(TapsellAdActivity)(cordova\.getActivity())/(TapsellAdActivity)(Object)(cordova.getActivity())/g' "$FILE"
          echo "پچ اعمال شد:"
          grep -n "TapsellAdActivity" "$FILE" || true

      - name: Build APK (debug)
        working-directory: cordova-project
        run: cordova build android --debug

      - name: Verify cordova.js is actually inside the built APK
        working-directory: cordova-project
        run: |
          APK=$(find platforms/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "بررسی فایل: $APK"
          echo "--- آیا cordova.js داخل APK هست؟ ---"
          unzip -l "$APK" | grep -i "cordova.js" || echo "❌❌❌ cordova.js اصلاً داخل APK نیست!"
          echo "--- آیا index.html تگ اسکریپت cordova.js رو داره؟ ---"
          unzip -p "$APK" assets/www/index.html | grep -o '<script[^>]*cordova[^>]*>' || echo "❌❌❌ تگ اسکریپت cordova.js داخل index.html تزریق نشده!"
          echo "--- آیا cordova_plugins.js هست؟ ---"
          unzip -l "$APK" | grep -i "cordova_plugins.js" || echo "❌❌❌ cordova_plugins.js نیست!"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-swap-debug-apk
          path: cordova-project/platforms/android/app/build/outputs/apk/debug/*.apk
